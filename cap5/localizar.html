
<!--
indexOf() - pesquisa a partir do inicio
lastIndexOf() - pesquisa a partir do final
*se existir o elemento pesquisado, o retorno será o número do índice da primeira ocorrência
*se resultado retornar -1, não existe o elemento pesquisado*
-->
<script>
    var idades = [5, 6, 8, 3, 6, 9];
    alert(idades.indexOf(6)); // retorna 1, pois ordem 0, 1
    alert(idades.lastIndexOf(6)); // retorna 4, pois ordem 1,2,3,4
    alert(idades.indexOf(7)); // retorna -1, pois não tem
</script>
