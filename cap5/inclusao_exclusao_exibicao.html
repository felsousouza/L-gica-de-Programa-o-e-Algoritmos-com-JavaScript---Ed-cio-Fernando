<!--
METODOS DE INCLUSÃO E EXCLUSÃO DE ITENS

push()
Adiciona elemementos dentro do array. 

unshift()
Adiciona um elemento ao início do vetor e desloca os elementos existentes uma posição abaixo.


pop()
Remove o último elemento do vetor.


shift() Remove o primeiro elemento do vetor e desloca os elementos existentes
uma posição acima

slice() Faz um copia do array em uma let/variavel de copia

splice() Inseri um elemento no meio do vetor(não tem exemplo nesse livro, diz para pesquisar como usar)
-->

<!--toString() e join() exibem os elementos de um vetor convertendo em string.
toString() = uma virgula separa os elementos
join() = Eu escolho o que irá separar. Se nao for indicado qual será o separador, irá exibir igual a toString-->
<script>
    var cidades = ["Pelotas", "São Lourenço", "Porto Alegre"];
    alert(cidades.toString() + "\n\n" + cidades.join(" - "));
</script>
